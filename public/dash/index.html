<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>蔚蓝咖啡厅控制面板</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap');

        html,
        body {
            height: 100%;
            width: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-family: 'Kosugi Maru', sans-serif;
            color: rgb(0, 0, 0);
            background-image: url("background.png");
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        content {
            margin: 0 10vw;
            padding: 15px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            justify-content: center;
            box-sizing: border-box;
            border-radius: 45px;
            background-color: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
        }

        header {
            display: flex;
            justify-content: center;
            font-weight: 400;
            font-size: 20pt;
        }

        main {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            place-items: center;
            box-sizing: border-box;
            width: 100%;
            padding: 15px 15px;
            row-gap: 10vh;
            border-radius: 30px;
            background-color: rgba(255, 255, 255, 0.5);
        }

        footer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
        }

        footer a {
            display: flex;
            align-items: center;
            padding: 12px;
            background-color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            border-radius: 12px;
            min-width: 100px;
            justify-content: flex-start;
            position: relative;
            cursor: pointer;
            color: rgb(27, 127, 243);
        }

        footer a img {
            width: 20px;
            height: 20px;
            left: 12px;
            position: absolute;
            opacity: 75%;
        }

        footer a span {
            display: block;
            text-align: center;
            margin-left: 32px;
            width: 100%;
        }

        .sync {
            color: rgb(46, 204, 113);
            font-weight: 600;
        }

        .wait {
            color: rgb(245, 180, 0);
            font-weight: 600;
        }

        .fail {
            color: rgb(231, 76, 60);
            font-weight: 600;
        }
    </style>
</head>

<body>
    <content>
        <header>
            <span><strong>蔚蓝咖啡厅控制面板</strong></span>
        </header>

        <main>
            <span><strong>功能</strong></span>
            <span>游戏文本</span>
            <span>主线中配</span>
            <span>图像视频</span>
            <span><strong>状态</strong></span>
            <span id="text-status" class="wait">获取中</span>
            <span id="voice-status" class="wait">获取中</span>
            <span id="media-status" class="wait">获取中</span>
            <span><strong>启用</strong></span>
            <input id="text-checkbox" type="checkbox">
            <input id="voice-checkbox" type="checkbox">
            <input id="media-checkbox" type="checkbox">
        </main>

        <footer>
            <a id="save-button"><img src="save.svg"><span>保存设置</span></a>
            <a id="read-button"><img src="read.svg"><span>查看说明</span></a>
            <a id="copy-button"><img src="copy.svg"><span>复制信息</span></a>
        </footer>
    </content>

    <script type="module">
        const element = (id) => document.getElementById(id);
        const getUid = () => document.cookie.split("uid=")[1]?.split(";")[0];
        const getPwd = () => document.cookie.split("pwd=")[1]?.split(";")[0];

        const uid = getUid();
        const [statusRes, configRes] = await Promise.all([
            fetch("https://api.bluearchive.cafe/status/list"),
            uid ? fetch("https://api.bluearchive.cafe/config/get?uid=" + uid) : {}
        ]);

        if (statusRes.ok) {
            const status = await statusRes.json();
            const textSynced = status.text.official.version === status.text.localized.version;
            const voiceSynced = status.voice.official.version === status.voice.localized.version;
            const mediaSynced = status.media.official.version === status.media.localized.version;

            element("text-status").textContent = textSynced ? "已同步" : "未同步";
            element("voice-status").textContent = voiceSynced ? "已同步" : "未同步";
            element("media-status").textContent = mediaSynced ? "已同步" : "未同步";

            element("text-status").className = textSynced ? "sync" : "fail";
            element("voice-status").className = voiceSynced ? "sync" : "fail";
            element("media-status").className = mediaSynced ? "sync" : "fail";
        }

        if (configRes.ok) {
            const config = await configRes.json();

            element("text-checkbox").checked = config.text === "cn";
            element("voice-checkbox").checked = config.voice === "cn";
            element("media-checkbox").checked = config.media === "cn";
        }

        element("save-button").onclick = async () => {
            let action = "update";
            let uid = getUid();
            let pwd = getPwd();

            if (!uid || !pwd) {
                action = "init";
                uid = new URLSearchParams(location.search).get("uid");
                pwd = Math.random().toString(36).slice(-8);
            }

            const text = element("text-checkbox").checked ? "cn" : "jp";
            const voice = element("voice-checkbox").checked ? "cn" : "jp";
            const media = element("media-checkbox").checked ? "cn" : "jp";
            const params = new URLSearchParams({ uid, pwd, text, voice, media });
            const response = await fetch(`https://api.bluearchive.cafe/config/${action}?${params}`);

            if (action === "init" && response.ok) {
                document.cookie = `uid=${uid}; Max-Age=2147483647`;
                document.cookie = `pwd=${pwd}; Max-Age=2147483647`;
            }

            if (action === "update" && response.status === 404) {
                document.cookie = `uid=; Max-Age=0`;
                document.cookie = `pwd=; Max-Age=0`;
            }
            
            alert(await response.text());
        };

        element("read-button").onclick = () => alert(`控制面板使用说明
1. 如果游戏异常可尝试暂时关闭文本汉化
2. 仅当同步状态为「已同步」时功能生效
3. 语音汉化功能生效范围仅限「主线剧情」
4. 请勿随意将自己的信息泄露给其他人`);

        element("copy-button").onclick = () => {
            const uid = getUid();
            const pwd = getPwd();
            
            navigator.clipboard.writeText(uid + "\n" + pwd);
            alert(`用户信息
UID: ${uid}
密码: ${pwd}
已复制到剪贴板
可用于配合API离线修改设置`)};
    </script>
</body>

</html>
