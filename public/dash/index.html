<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>蔚蓝咖啡厅控制面板</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap');

        html,
        body {
            height: 100%;
            width: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-family: 'Kosugi Maru', sans-serif;
            color: rgb(0, 0, 0);
            background-image: url("/assets/images/background.png");
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        content {
            margin: 0 10vw;
            padding: 15px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            justify-content: center;
            box-sizing: border-box;
            border-radius: 45px;
            background-color: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
        }

        header {
            display: flex;
            justify-content: center;
            font-weight: 400;
            font-size: 20pt;
        }

        main {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            place-items: center;
            box-sizing: border-box;
            width: 100%;
            padding: 15px 15px;
            row-gap: 10vh;
            border-radius: 30px;
            background-color: rgba(255, 255, 255, 0.5);
        }

        footer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
        }

        footer a {
            display: flex;
            align-items: center;
            padding: 12px;
            background-color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            border-radius: 12px;
            min-width: 100px;
            justify-content: flex-start;
            position: relative;
            cursor: pointer;
            color: rgb(27, 127, 243);
        }

        footer a img {
            width: 20px;
            height: 20px;
            left: 12px;
            position: absolute;
            opacity: 75%;
        }

        footer a span {
            display: block;
            text-align: center;
            margin-left: 32px;
            width: 100%;
        }

        .wait {
            color: rgb(245, 180, 0);
            font-weight: 600;
        }

        .ok {
            color: rgb(46, 204, 113);
            font-weight: 600;
        }

        .fail {
            color: rgb(231, 76, 60);
            font-weight: 600;
        }
    </style>
</head>

<body>
    <content>
        <header>
            <strong>蔚蓝咖啡厅控制面板</strong>
        </header>

        <main>
            <span><strong>功能</strong></span>
            <span>游戏文本</span>
            <span>主线中配</span>
            <span>图像视频</span>
            <span><strong>状态</strong></span>
            <span id="text">获取中</span>
            <span id="voice">获取中</span>
            <span id="media">获取中</span>
            <span><strong>启用</strong></span>
            <input id="text-check" type="checkbox">
            <input id="voice-check" type="checkbox">
            <input id="media-check" type="checkbox">
        </main>

        <footer>
            <a id="save"><img src="/assets/icons/save.svg"><span>保存设置</span></a>
            <a id="read"><img src="/assets/icons/read.svg"><span>查看说明</span></a>
            <a id="copy"><img src="/assets/icons/copy.svg"><span>显示UUID</span></a>
        </footer>
    </content>

    <script>
        (async () => {
            const params = new URLSearchParams(location.search);
            const uid = params.get("uid");
            const [status, preference] = await Promise.all([
                fetch("https://api.bluearchive.cafe/status/list"),
                fetch(`https://api.bluearchive.cafe/config/get?uid=${uid}`)
            ]);
            const map = {
                text: "text",
                voice: "voice",
                media: "media"
            };

            const data = status.ok ? await status.json() : null;
            ["text", "voice", "media"].forEach(id => {
                const el = document.getElementById(id);
                el.classList.remove("ok", "fail", "wait");

                if (!status.ok) {
                    el.textContent = "未获取";
                    el.classList.add("wait");
                    return;
                }

                const key = map[id];
                const official = data[key]?.official?.version;
                const localized = data[key]?.localized?.version;

                if (!official || !localized) {
                    el.textContent = "未获取";
                    el.classList.add("wait");
                } else if (official === localized) {
                    el.textContent = "已同步";
                    el.classList.add("ok");
                } else {
                    el.textContent = "未同步";
                    el.classList.add("fail");
                }
            });

            let text, image, voice, media;
            if (preference.ok) {
                ({ text, image, voice, media } = await preference.json());
                document.getElementById("text-check").checked = text === "cn";
                document.getElementById("voice-check").checked = voice === "cn";
                document.getElementById("media-check").checked = media === "cn";
            } else text = voice = media = "jp";

            document.getElementById("save").addEventListener("click", async () => {
                const preference = {
                    text: document.getElementById("text-check").checked ? "cn" : "jp",
                    voice: document.getElementById("voice-check").checked ? "cn" : "jp",
                    media: document.getElementById("media-check").checked ? "cn" : "jp"
                };

                if (preference.text === text && preference.voice === voice && preference.media === media) {
                    alert(`保存失败\n没有需要保存的设置`);
                    return;
                }

                const response = await fetch(`https://api.bluearchive.cafe/config/update?uid=${uid}&text=${preference.text}&voice=${preference.voice}&media=${preference.media}`);
                if (response.ok) {
                    ({ text, voice, media } = preference);
                    alert(`保存成功\n重新登录游戏以生效`);
                } else alert(`保存失败\n${response.status} ${response.statusText}`);
            });

            document.getElementById("read").addEventListener("click", () => {
                alert(`控制面板使用说明
1. 如果游戏异常可尝试暂时关闭文本汉化
2. 仅当同步状态为「已同步」时功能生效
3. 语音汉化功能生效范围仅限「主线剧情」
4. 请勿随意将自己的UUID泄露给其他人`);
            });

            document.getElementById("copy").addEventListener("click", async () => {
                try {
                    await navigator.clipboard.writeText(uid);
                    alert(`UUID\n已复制到剪贴板\n${uid}`);
                } catch { alert(`UUID\n未复制到剪贴板\n${uid}`); }
            });
        })();
    </script>
</body>

</html>
